apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-api
  namespace: taskflow-prod
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: taskflow-api
  template:
    metadata:
      labels:
        app: taskflow-api
    spec:
      containers:
        - name: taskflow-api
          image: hashicorp/http-echo:latest
          args:
          - "-text=Halo dari TaskFlow API (PROD) v2! Fitur Baru!"
          - "-listen=:8080"
          ports:
            - containerPort: 8080
