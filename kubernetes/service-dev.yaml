apiVersion: v1
kind: Service
metadata:
  name: taskflow-api
  namespace: taskflow-dev
spec:
  type: NodePort
  selector:
    app: taskflow-api
  ports:
    - port: 80          # Port Service
      targetPort: 8080  # Port di dalam Pod
      nodePort: 30080  # Port yang diakses dari luar (bedain sama PROD)
