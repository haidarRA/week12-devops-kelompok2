apiVersion: v1
kind: Service
metadata:
  name: taskflow-api
  namespace: taskflow-prod
spec:
  type: NodePort
  selector:
    app: taskflow-api   # Arahkan ke Pod berlabel ini
  ports: 
    - port: 80            # Port Service
      targetPort: 8080  # Port di dalam Pod
      nodePort: 30081   # Port yang diakses dari luar